_meta:
  experiment: machine_temp_iforest
  description: >
    Isolation Forest on rolling-context features using NAB machine temperature dataset.

dataset:
  name: machine_temp
  path: ../NAB/data/realKnownCause/machine_temperature_system_failure.csv
  timestamp_col: timestamp
  value_col: value
  label_col: null

labels:
  type: nab_combined
  path: ../NAB/labels/combined_labels.json
  series_key: realKnownCause/machine_temperature_system_failure.csv
  match_mode: suffix
  window_minutes: 60

split:
  train_frac: 0.7

features:
  kind: rolling_context
  roll_window: 24
  long_window: 168
  include_raw: true

model:
  type: iforest

iforest:
  n_estimators: 800
  max_samples: 256
  max_features: 0.8
  random_state: 42
  n_jobs: -1

threshold:
  method: alert_rate
  alert_rate: 0.05

output:
  dir: outputs/machine_temp_iforest
  save_scored_frame: true
  save_metrics: true
