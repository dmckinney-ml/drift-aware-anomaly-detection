_meta:
  experiment: machine_temp_mad
  description: >
    Rolling MAD baseline on NAB machine_temperature_system_failure.
    Uses raw value signal + rolling MAD scoring (window=24) with a fixed
    threshold selected from training percentile sweep (~80.2–80.3rd).
    Note: achieving recall required a high alert rate (~20%), indicating
    weak separability for this baseline under a strict alert budget.

dataset:
  name: machine_temp
  path: ../NAB/data/realKnownCause/machine_temperature_system_failure.csv
  timestamp_col: timestamp
  value_col: value
  label_col: null

labels:
  type: nab_combined
  path: ../NAB/labels/combined_labels.json
  series_key: realKnownCause/machine_temperature_system_failure.csv
  match_mode: suffix
  window_minutes: 60

split:
  train_frac: 0.7

features:
  kind: raw

model:
  type: baseline_mad

baseline_mad:
  value_col: value
  window: 24

# Thresholding (locked operating point from notebook sweep)
threshold:
  method: fixed
  threshold: 1.211859
  selected_from:
    train_percentile: 80.2
    expected_alert_rate: 0.199736
    notebook_metrics:
      precision: 0.000735
      recall: 0.5
      f1: 0.001468
      alerts: 1360

evaluation:
  mode: event
  window_tolerance: 60min # expand labeled windows by +/- 60min
  pred_merge_gap: 60min # merge predicted points into bursts
  pred_min_width: 30min # ensure predicted windows have at least this duration

output:
  dir: outputs/machine_temp_mad
  save_scored_frame: true
  save_metrics: true
